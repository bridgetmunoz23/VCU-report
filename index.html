<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VCU Rams · 2025-26 Roster Scouting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f7f5;
  --card: #ffffff;
  --ink: #14181f;
  --muted: #5b6470;
  --rule: #e6e6e6;
  --rule-soft: #efefec;
  --accent: #1f2a3a;
  --green: #2f7a4a;
  --green-bg: #e7f1ea;
  --amber: #b06b00;
  --amber-bg: #f6ecd9;
  --red: #b23a3a;
  --red-bg: #f4e1e1;
  --purple-light: #e8defc;
  --purple-deep: #5b2b9c;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'tnum' 1, 'lnum' 1;
}

main {
  max-width: 1180px;
  margin: 0 auto;
  padding: 72px 44px 96px;
}

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

/* ---------- Page header ---------- */
.page-header {
  padding-bottom: 36px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 48px;
}

.page-header h1 {
  font-size: 46px;
  line-height: 1.05;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin: 10px 0 12px;
  color: var(--ink);
}

.page-header .lede {
  font-size: 15.5px;
  color: var(--muted);
  font-weight: 500;
  margin: 0 0 0;
  line-height: 1.55;
  max-width: 680px;
}

.section-eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 700;
  margin-bottom: 22px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.section-eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--accent);
}

.section-eyebrow.muted {
  color: var(--muted);
  font-weight: 500;
}

.section-eyebrow.muted::before { background: var(--muted); }

/* ---------- Sort control ---------- */
.grid-controls {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 18px;
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
}

.sort-select {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: none;
  color: var(--ink);
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 6px 28px 6px 12px;
  cursor: pointer;
  font-weight: 500;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%235b6470' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 9px;
}

.sort-select:hover  { border-color: #cbcbc7; }
.sort-select:focus  { outline: none; border-color: var(--accent); }

/* ---------- Card grid ---------- */
.card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.card-grid.limited {
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.player-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 22px 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.player-card:hover {
  border-color: #cbcbc7;
  box-shadow: 0 1px 3px rgba(20,24,31,0.05);
}

.player-card.limited {
  padding: 18px 20px 16px;
  gap: 12px;
}

/* Card header: photo + name block */
.card-head {
  display: grid;
  grid-template-columns: 76px 1fr;
  gap: 16px;
  align-items: start;
}

.player-card.limited .card-head {
  grid-template-columns: 56px 1fr;
  gap: 12px;
}

.card-photo {
  position: relative;
  width: 76px;
  height: 95px;
  background: linear-gradient(180deg, #f0f0ed 0%, #e4e4e0 100%);
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
  flex-shrink: 0;
}

.player-card.limited .card-photo { width: 56px; height: 70px; }

.card-photo .ph-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-photo img {
  position: relative;
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

.card-name-block {
  min-width: 0;
}

.card-meta {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.card-meta .num { font-weight: 600; color: var(--ink); }
.card-meta span + span::before { content: "·"; color: #c8c8c4; margin: 0 6px; }

.card-name {
  font-size: 22px;
  line-height: 1.1;
  font-weight: 700;
  letter-spacing: -0.012em;
  color: var(--ink);
  margin: 0 0 8px;
}

.player-card.limited .card-name { font-size: 18px; margin-bottom: 6px; }

.card-bio {
  font-size: 11.5px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  line-height: 1.45;
  margin-bottom: 10px;
}

.card-bio span + span::before { content: "·"; color: #c8c8c4; margin: 0 6px; }

.archetype-pill {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 3px;
}

.archetype-pill.empty {
  background: transparent;
  color: var(--muted);
  border: 1px dashed var(--rule);
}

/* Usage row */
.card-usage {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}

.card-usage-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--muted);
}

.card-usage-row .usage-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  color: var(--ink);
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
}

.card-usage-row .usage-val .unit {
  color: var(--muted);
  font-weight: 500;
  margin-left: 1px;
}

.usage-bar {
  position: relative;
  height: 6px;
  background: #f0f0ed;
  border-radius: 2px;
}

.usage-bar-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--accent);
  border-radius: 2px;
}

.usage-bar-mark {
  position: absolute;
  top: -2px;
  bottom: -2px;
  width: 1px;
  background: #cfcfca;
}

.usage-role-line {
  font-size: 11px;
  color: var(--muted);
}

.usage-role-line .role-name { color: var(--ink); font-weight: 600; }

/* KPI tiles */
.kpi-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.kpi-tile {
  background: #faf9f6;
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  padding: 10px 11px;
}

.kpi-tile-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.kpi-tile-value {
  font-size: 19px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.012em;
  margin-top: 3px;
  line-height: 1.1;
}

.val-green { color: var(--green); }
.val-amber { color: var(--amber); }
.val-red   { color: var(--red); }
.val-muted { color: var(--muted); }

/* Top plays */
.card-plays {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.card-plays-eyebrow {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 1px;
}

.play-row {
  display: grid;
  grid-template-columns: 1.4fr 0.65fr 0.6fr 0.7fr;
  align-items: baseline;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  gap: 6px;
}

/* Column header row that aligns with the play-row grid below. */
.play-header {
  display: grid;
  grid-template-columns: 1.4fr 0.65fr 0.6fr 0.7fr;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  padding-bottom: 5px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--rule-soft);
}

.play-header span:nth-child(n+2) { text-align: right; }

.play-row .play-name { color: var(--ink); font-weight: 500; }
.play-row .play-freq { color: var(--muted); font-size: 11px; text-align: right; }
.play-row .play-pps  { font-weight: 600; text-align: right; font-family: 'IBM Plex Mono', monospace; }
.play-row .play-verdict {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  text-align: right;
}

/* Shot diet stripe */
.shot-stripe {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.shot-stripe-eyebrow {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.stripe-bar {
  display: flex;
  height: 22px;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--rule-soft);
}

.stripe-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
}

.stripe-seg.dark { color: #fff; }
.stripe-seg.light { color: var(--ink); }

.stripe-legend {
  display: flex;
  gap: 14px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  flex-wrap: wrap;
}

.stripe-legend .leg-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.stripe-legend .leg-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* View report link */
.card-cta {
  margin-top: 4px;
  padding-top: 14px;
  border-top: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11.5px;
  letter-spacing: 0.04em;
  color: var(--muted);
}

.card-cta .games {
  font-variant-numeric: tabular-nums;
}

.card-cta-link {
  font-size: 11.5px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--accent);
}

.player-card:hover .card-cta-link { color: var(--ink); }

.card-cta-link::after { content: " →"; }

/* Limited Minutes section: a touch more space above */
#limited-section { margin-top: 60px; }

/* ---------- Footer ---------- */
.footer {
  border-top: 1px solid var(--rule);
  padding-top: 28px;
  margin-top: 72px;
  font-size: 11.5px;
  line-height: 1.65;
  color: var(--muted);
}

.footer p { margin: 0 0 14px; }
.byline { font-weight: 500; color: var(--ink); }
.footer a { color: var(--muted); text-decoration: underline; text-decoration-color: #d4d4d0; }
.footer a:hover { color: var(--ink); }

/* ---------- Responsive ---------- */
@media (max-width: 960px) {
  main { padding: 56px 28px 80px; }
  .page-header h1 { font-size: 36px; }
  .card-grid, .card-grid.limited { grid-template-columns: 1fr; }
}

@media (max-width: 520px) {
  .card-head { grid-template-columns: 64px 1fr; gap: 12px; }
  .card-photo { width: 64px; height: 80px; }
  .card-name { font-size: 19px; }
  .play-row { grid-template-columns: 1.2fr 0.6fr 0.5fr 0.7fr; }
  .kpi-tiles { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<main>

<header class="page-header">
  <div class="eyebrow">Mock Scouting Report</div>
  <h1>VCU Rams · 2025-26</h1>
  <p class="lede">Team Overview · Click on card for full report</p>
</header>

<section>
  <div class="grid-controls">
    <span>Sort</span>
    <select id="sort-select" class="sort-select" aria-label="Sort roster">
      <option value="minPct">Minutes played (high → low)</option>
      <option value="possPct">Usage % (high → low)</option>
      <option value="ortg">ORtg (high → low)</option>
      <option value="jersey">Jersey number (low → high)</option>
      <option value="alpha">Last name (A → Z)</option>
    </select>
  </div>
  <div class="card-grid" id="main-grid"></div>
</section>

<section id="limited-section">
  <div class="section-eyebrow muted">Limited Minutes</div>
  <div class="card-grid limited" id="limited-grid"></div>
</section>

<footer class="footer">
  <p><span class="byline">Bridget Muñoz</span> · Self-directed scouting portfolio · <a href="mailto:bridgetmunoz@gwu.edu">bridgetmunoz@gwu.edu</a></p>
</footer>

</main>

<script src="players.js"></script>
<script>
(function () {

  // ---------- helpers ----------
  function fmt1(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Number(v).toFixed(1);
  }
  function fmt2(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Number(v).toFixed(2);
  }
  function heightDisplay(h) {
    if (!h) return '';
    var m = String(h).match(/^(\d+)-(\d+)$/);
    if (!m) return h;
    return m[1] + "'" + m[2] + '"';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function ortgClass(o) {
    if (o == null) return 'val-muted';
    if (o >= 115) return 'val-green';
    if (o >= 105) return 'val-amber';
    return 'val-red';
  }
  function efgClass(efg, avg) {
    if (efg == null) return 'val-muted';
    if (efg >= avg + 2) return 'val-green';
    if (efg < avg - 2) return 'val-red';
    return 'val-amber';
  }
  function tsClass(ts, avg) { return efgClass(ts, avg); }

  function usageRole(possPct) {
    if (possPct == null) return { name: '—', band: '' };
    if (possPct < 12) return { name: 'Bench/Limited',           band: '<12% poss' };
    if (possPct < 16) return { name: 'Limited Role',            band: '12–16% poss' };
    if (possPct < 20) return { name: 'Role Player',             band: '16–20% poss' };
    if (possPct < 24) return { name: 'Significant Contributor', band: '20–24% poss' };
    if (possPct < 28) return { name: 'Major Contributor',       band: '24–28% poss' };
    return                  { name: 'Go-To Scorer',             band: '28%+ poss' };
  }

  function verdictColor(v) {
    if (!v) return 'val-muted';
    var s = v.toLowerCase();
    if (s === 'excellent' || s === 'very good') return 'val-green';
    if (s === 'good' || s === 'average') return 'val-amber';
    if (s === 'below average') return 'val-muted';
    if (s === 'poor') return 'val-red';
    return 'val-muted';
  }

  // Shot zone colors (deepest = highest volume)
  var ZONE_COLORS_BY_RANK = ['#5b2b9c', '#8a5cc0', '#d5c4ed', '#dfd3f6'];
  var ZONE_NAMES = {
    beyondArc: '3PT',
    restrictedArea: 'RA',
    paint: 'Paint',
    midrange: 'Mid',
  };

  // ---------- render one card ----------
  function topPlays(playTypes, n) {
    var arr = (playTypes || []).filter(function (p) { return (p.poss || 0) > 0; });
    arr.sort(function (a, b) { return (b.poss || 0) - (a.poss || 0); });
    return arr.slice(0, n);
  }

  function shotStripeHTML(zones) {
    if (!zones) return '';
    var keys = ['beyondArc', 'restrictedArea', 'paint', 'midrange'];
    var entries = keys.map(function (k) {
      return { key: k, data: zones[k] || { volume: 0, efg: null } };
    });
    // Sort by volume to pick color rank
    var byVolume = entries.slice().sort(function (a, b) {
      return (b.data.volume || 0) - (a.data.volume || 0);
    });
    var colorByKey = {};
    byVolume.forEach(function (e, idx) { colorByKey[e.key] = ZONE_COLORS_BY_RANK[idx]; });

    // Render in canonical visual order: 3PT, RA, Paint, Mid
    var totalVol = entries.reduce(function (s, e) { return s + (e.data.volume || 0); }, 0);
    if (totalVol <= 0) return '';

    var segs = entries.map(function (e) {
      var vol = e.data.volume || 0;
      if (vol <= 0) return '';
      var pct = (vol / totalVol) * 100;
      var color = colorByKey[e.key];
      // Dark backgrounds get white text, light backgrounds get ink
      var isDark = (color === '#5b2b9c' || color === '#8a5cc0');
      var cls = isDark ? 'dark' : 'light';
      // Always lead with the zone name so no segment shows a bare percentage.
      var labelText = vol >= 7 ? (ZONE_NAMES[e.key] + ' ' + Math.round(vol) + '%') :
                      vol >= 3 ? ZONE_NAMES[e.key] :
                                 '';
      return '<div class="stripe-seg ' + cls + '" style="flex:' + pct.toFixed(2) +
        '; background:' + color + ';">' + escapeHtml(labelText) + '</div>';
    }).join('');

    return '<div class="shot-stripe">' +
      '<div class="shot-stripe-eyebrow">Shot Diet · % of attempts</div>' +
      '<div class="stripe-bar">' + segs + '</div>' +
    '</div>';
  }

  function renderCard(key, p, limited) {
    var k = p.kenpom || {};
    var a = document.createElement('a');
    a.className = 'player-card' + (limited ? ' limited' : '');
    a.href = 'player.html?player=' + encodeURIComponent(key);

    var photoHTML = '<div class="card-photo">' +
      (p.photo
        ? '<img src="' + escapeHtml(p.photo) + '" alt="' + escapeHtml(p.name || '') + '" onerror="this.remove();">'
        : '<span class="ph-fallback">Photo</span>') +
    '</div>';

    var metaParts = [];
    if (p.number != null && p.number !== '') metaParts.push('<span class="num">#' + escapeHtml(String(p.number)) + '</span>');
    if (p.primary_position) metaParts.push('<span>' + escapeHtml(p.primary_position) + '</span>');
    if (p.year_abbr) metaParts.push('<span>' + escapeHtml(p.year_abbr) + '</span>');

    var bioParts = [];
    if (p.height) bioParts.push('<span>' + escapeHtml(heightDisplay(p.height)) + '</span>');
    if (p.weight) bioParts.push('<span>' + escapeHtml(p.weight + ' lbs') + '</span>');
    if (p.hometown) bioParts.push('<span>' + escapeHtml(p.hometown) + '</span>');

    var archetypeHTML = p.archetype
      ? '<span class="archetype-pill">' + escapeHtml(p.archetype) + '</span>'
      : '<span class="archetype-pill empty">archetype pending</span>';

    // Usage
    var role = usageRole(k.possPct);
    var fill = k.possPct ? Math.max(0, Math.min(100, (k.possPct / 30) * 100)) : 0;
    var usageHTML = '<div class="card-usage">' +
      '<div class="card-usage-row"><span>Usage</span><span class="usage-val">' + fmt1(k.possPct) + '<span class="unit">%</span></span></div>' +
      '<div class="usage-bar">' +
        '<div class="usage-bar-fill" style="width:' + fill.toFixed(1) + '%"></div>' +
        '<div class="usage-bar-mark" style="left:40%"></div>' +
        '<div class="usage-bar-mark" style="left:53.3%"></div>' +
        '<div class="usage-bar-mark" style="left:66.7%"></div>' +
        '<div class="usage-bar-mark" style="left:80%"></div>' +
        '<div class="usage-bar-mark" style="left:93.3%"></div>' +
      '</div>' +
      '<div class="usage-role-line"><span class="role-name">' + escapeHtml(role.name) + '</span> · ' + escapeHtml(role.band) + '</div>' +
    '</div>';

    // KPI tiles: ORtg, TS%, eFG%
    var kpiHTML = '<div class="kpi-tiles">' +
      '<div class="kpi-tile"><div class="kpi-tile-label">ORtg</div><div class="kpi-tile-value ' + ortgClass(k.ortg) + '">' + fmt1(k.ortg) + '</div></div>' +
      '<div class="kpi-tile"><div class="kpi-tile-label">TS%</div><div class="kpi-tile-value ' + tsClass(k.ts, 54.0) + '">' + fmt1(k.ts) + '</div></div>' +
      '<div class="kpi-tile"><div class="kpi-tile-label">eFG%</div><div class="kpi-tile-value ' + efgClass(k.efg, 51.0) + '">' + fmt1(k.efg) + '</div></div>' +
    '</div>';

    // Top plays
    var n = limited ? 2 : 3;
    var plays = topPlays(p.playTypes, n);
    var playsHTML = '';
    if (plays.length > 0) {
      var rows = plays.map(function (pt) {
        var verdict = pt.verdict || '';
        return '<div class="play-row">' +
          '<span class="play-name">' + escapeHtml(pt.name) + '</span>' +
          '<span class="play-freq">' + fmt1(pt.timePct) + '%</span>' +
          '<span class="play-pps">' + fmt2(pt.pps) + '</span>' +
          '<span class="play-verdict ' + verdictColor(verdict) + '">' + escapeHtml(verdict || '—') + '</span>' +
        '</div>';
      }).join('');
      playsHTML = '<div class="card-plays">' +
        '<div class="card-plays-eyebrow">Top Play Types</div>' +
        '<div class="play-header">' +
          '<span></span>' +
          '<span>Freq</span>' +
          '<span>PPP</span>' +
          '<span>Rating</span>' +
        '</div>' +
        rows +
      '</div>';
    }

    var stripeHTML = limited ? '' : shotStripeHTML(p.shotZones);

    var games = p.games ? p.games + ' games' : '';
    var ctaHTML = '<div class="card-cta">' +
      '<span class="games">' + escapeHtml(games) + '</span>' +
      '<span class="card-cta-link">View full report</span>' +
    '</div>';

    a.innerHTML =
      '<div class="card-head">' +
        photoHTML +
        '<div class="card-name-block">' +
          (metaParts.length ? '<div class="card-meta">' + metaParts.join('') + '</div>' : '') +
          '<h2 class="card-name">' + escapeHtml(p.name || '') + '</h2>' +
          (bioParts.length ? '<div class="card-bio">' + bioParts.join('') + '</div>' : '') +
          archetypeHTML +
        '</div>' +
      '</div>' +
      usageHTML +
      kpiHTML +
      playsHTML +
      stripeHTML +
      ctaHTML;

    return a;
  }

  // ---------- sorting ----------
  // The Limited-Minutes split is meaningful only when sorted by %Min.
  // For every other sort, all 10 players go into the main grid so the
  // chosen order is honored end to end.
  function lastName(p) {
    var parts = (p.name || '').trim().split(/\s+/);
    return (parts[parts.length - 1] || '').toLowerCase();
  }

  function sortEntries(entries, key) {
    var arr = entries.slice();
    if (key === 'alpha') {
      arr.sort(function (a, b) {
        var la = lastName(a.p), lb = lastName(b.p);
        return la < lb ? -1 : la > lb ? 1 : 0;
      });
    } else if (key === 'jersey') {
      arr.sort(function (a, b) {
        var na = Number(a.p.number), nb = Number(b.p.number);
        if (isNaN(na)) na = Infinity;
        if (isNaN(nb)) nb = Infinity;
        return na - nb;
      });
    } else {
      arr.sort(function (a, b) {
        var k = (key === 'possPct') ? 'possPct'
              : (key === 'ortg')    ? 'ortg'
              :                       'minPct';
        return ((b.p.kenpom && b.p.kenpom[k]) || 0) -
               ((a.p.kenpom && a.p.kenpom[k]) || 0);
      });
    }
    return arr;
  }

  function rankedByMinPct(entries) {
    return entries.slice().sort(function (a, b) {
      return ((b.p.kenpom && b.p.kenpom.minPct) || 0) -
             ((a.p.kenpom && a.p.kenpom.minPct) || 0);
    });
  }

  // ---------- main ----------
  function render() {
    if (typeof players === 'undefined' || !players) return;
    var entries = Object.keys(players).map(function (k) {
      return { key: k, p: players[k] };
    });

    var sortEl = document.getElementById('sort-select');
    var sortKey = (sortEl && sortEl.value) || 'minPct';

    var mainEl = document.getElementById('main-grid');
    var limitedEl = document.getElementById('limited-grid');
    var limitedSection = document.getElementById('limited-section');
    mainEl.innerHTML = '';
    limitedEl.innerHTML = '';

    if (sortKey === 'minPct') {
      // Default: top 8 in main grid, bottom 2 in Limited Minutes
      var ranked = rankedByMinPct(entries);
      var main = ranked.slice(0, 8);
      var limited = ranked.slice(8);
      main.forEach(function (e) { mainEl.appendChild(renderCard(e.key, e.p, false)); });
      if (limited.length === 0) {
        limitedSection.style.display = 'none';
      } else {
        limitedSection.style.display = '';
        limited.forEach(function (e) { limitedEl.appendChild(renderCard(e.key, e.p, true)); });
      }
    } else {
      // Other sorts: single grid with all 10 players in the chosen order
      var sorted = sortEntries(entries, sortKey);
      sorted.forEach(function (e) { mainEl.appendChild(renderCard(e.key, e.p, false)); });
      limitedSection.style.display = 'none';
    }
  }

  function init() {
    var sortEl = document.getElementById('sort-select');
    if (sortEl) {
      // Restore the user's last sort choice for this tab, so navigating
      // into a player report and back doesn't reset the dropdown.
      try {
        var saved = sessionStorage.getItem('vcu_sort');
        if (saved) {
          var values = [].slice.call(sortEl.options).map(function (o) { return o.value; });
          if (values.indexOf(saved) !== -1) sortEl.value = saved;
        }
      } catch (e) { /* sessionStorage may be unavailable; ignore */ }

      sortEl.addEventListener('change', function () {
        try { sessionStorage.setItem('vcu_sort', sortEl.value); } catch (e) {}
        render();
      });
    }
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
